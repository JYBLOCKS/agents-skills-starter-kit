artifact_type: skill
normalized_path_pattern: skills/<skill-name>/
required_questions:
  - skill_name
  - purpose
  - trigger_phrases
  - supported_tools
  - required_inputs
  - produced_outputs
  - guardrails
  - process_steps
conditional_questions:
  - condition: needs_references
    ask:
      - reference_files
  - condition: needs_assets
    ask:
      - asset_files
  - condition: needs_scripts
    ask:
      - script_files
contract_mapping:
  - skills/CONTRACT.md
  - templates/skill/SKILL.md
  - templates/skill/metadata.yaml
validation_checks:
  - SKILL.md, metadata.yaml, and an example are drafted
  - supported tools are explicit
  - guardrails and output expectations are concrete
